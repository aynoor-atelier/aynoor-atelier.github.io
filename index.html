<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>
        Aynoor Atelier | Capital of Chronicles
    </title>


    <!-- Luxury Editorial Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">


    <!-- Main Styles -->

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/animation.css">


</head>

<body>

    <div class="scene">

        <!-- Ambient light -->
        <div class="spotlight"></div>

        <!-- Book -->
        <div class="book" id="book">

            <!-- Back cover -->
            <div class="back-cover"></div>


            <!-- Front cover -->
            <div class="cover">

                <div class="texture"></div>

                <div class="gold-frame"></div>

                <div class="cover-content">

                    <img src="logo.png" class="logo" alt="Aynoor Logo">


                    <h1>
                        AYNOOR
                    </h1>

                    <h2>
                        ATELIER
                    </h2>


                    <p class="subtitle">
                        Capital of Chronicles
                    </p>


                    <div class="divider"></div>


                    <p class="statement">
                        NOT ACQUISITION.<br>
                        CUSTODIANSHIP.
                    </p>


                    <div class="volume">
                        VOLUME I
                    </div>


                    <div class="year">
                        MMXXVI
                    </div>


                    <img src="seal.png" class="seal" alt="Royal Seal">


                    <div class="break">
                        BREAK THE ROYAL SEAL
                    </div>

                </div>

            </div>


            <!-- Opening page -->
            <div class="page">

                <h3>
                    WELCOME
                </h3>


                <div class="page-line"></div>


                <p>
                    Every chronicle begins with a single page.
                    You are not entering a website.
                    You are entering a living archive.
                </p>


                <button id="enterVault">
                    ENTER THE VAULT
                </button>


            </div>


        </div>


    </div>



<script src="js/main.js"></script>

</body>

</html>
