<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AYNOOR ATELIER</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="css/animations.css">

</head>

<body>

<!-- Background -->

<div class="background"></div>

<div class="ambient-light"></div>

<div class="noise"></div>

<div class="vignette"></div>

<!-- Scene -->

<main class="scene">

<div class="book" id="book">

<!-- Spine -->

<div class="spine"></div>

<!-- ===========================
COVER
=========================== -->

<section class="cover" id="cover">

<div class="gold-frame"></div>

<header class="cover-content">

<img
src="logo.png"
alt="Logo"
class="logo">

<h1>

AYNOOR

<span>ATELIER</span>

</h1>

<p class="tagline">

Capital of Chronicles

</p>

<div class="divider"></div>

<div class="motto">

<p>

NOT ACQUISITION.

</p>

<p>

CUSTODIANSHIP.

</p>

</div>

<div class="edition">

<p>Volume I</p>

<p>MMXXVI</p>

</div>

            <!-- Royal Seal -->

        <div class="seal-area">

            <button
                class="seal-button"
                id="sealButton"
                aria-label="Break the Royal Seal">

                <img
                    src="seal.png"
                    alt="Royal Wax Seal">

            </button>

            <p class="seal-text">

                Break the Royal Seal

            </p>

        </div>

    </section>

    <!-- ===========================
         FIRST PAGE
    =========================== -->

    <section class="page" id="page">

        <div class="page-content">

            <h2>

                Welcome

            </h2>

            <div class="page-divider"></div>

            <p class="welcome-text">

                Every chronicle begins with a single page.

                You are not entering a website.

                You are entering a living archive.

            </p>

            <button
                class="enter-button"
                id="enterButton">

                ENTER THE INSTITUTION

            </button>

        </div>

    </section>

</div>

</main>

<script src="js/main.js"></script>

</body>

</html>
