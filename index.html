<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AYNOOR Atelier</title>

    <!-- Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">

</head>

<body>

    <!-- Spotlight -->

    <div class="spotlight"></div>


    <!-- Scene -->

    <main class="scene">

        <!-- Book -->

        <section class="book" id="book">

            <!-- Spine -->

            <div class="spine"></div>


            <!-- Front Cover -->

            <article class="cover">

                <div class="cover-noise"></div>

                <div class="cover-border"></div>

                <div class="cover-inner"></div>


                <!-- Logo -->

                <img src="logo.png"
                     class="logo"
                     alt="AYNOOR">


                <!-- Title -->

                <h1>AYNOOR</h1>

                <h2>ATELIER</h2>


                <!-- Motto -->

                <p class="chronicle">

                    Capital of Chronicles

                </p>

                <div class="gold-line"></div>

                <p class="custody">

                    NOT ACQUISITION.<br>

                    CUSTODIANSHIP.

                </p>


                <!-- Volume -->

                <div class="volume">

                    <span>VOLUME I</span>

                    <span>MMXXVI</span>

                </div>


                <!-- Royal Seal -->

                <img src="seal.png"
                     class="seal"
                     alt="Royal Seal">


                <!-- Footer -->

                <p class="break">

                    BREAK THE ROYAL SEAL

                </p>

            </article>


            <!-- First Page -->

            <article class="page">

                <div class="page-content">

                    <h2>

                        WELCOME

                    </h2>

                    <div class="page-line"></div>

                    <p>

                        Every Chronicle begins with a single page.

                        <br><br>

                        You are not entering a website.

                        <br>

                        You are entering a living archive.

                    </p>

                    <button id="enterVault">

                        ENTER THE VAULT

                    </button>

                </div>

            </article>

        </section>

    </main>

    <!-- Audio -->

    <audio id="sealSound" preload="auto">

        <source src="seal.mp3" type="audio/mpeg">

    </audio>

    <audio id="pageSound" preload="auto">

        <source src="page.mp3" type="audio/mpeg">

    </audio>


    <!-- JS -->

    <script src="js/main.js"></script>

</body>

</html>
